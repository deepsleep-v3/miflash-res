name: Github Pages

on:
#   push:
#     branches:
#       - master          # 如果你的默认分支是 main，请改为 main
  workflow_dispatch:    # 手动触发

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ✅ 关键：授予写入权限
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - uses: jeffreytse/jekyll-deploy-action@v0.6.0
        with:
          provider: 'github'
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ''
          branch: 'gh-pages'
          jekyll_src: './'
          jekyll_cfg: '_config.yml'
          jekyll_baseurl: '/miflash-res'
          cname: ''
          actor: ''
